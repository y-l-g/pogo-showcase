name: pogo-showcase

services:
    app:
        build:
            context: ..
            dockerfile: .dev/Dockerfile
            args:
                USER_ID: ${USER_ID:-1000}
                GROUP_ID: ${GROUP_ID:-1000}
        command:
            [
                'sh',
                '-lc',
                'rm -f bootstrap/cache/config.php && php artisan optimize:clear && frankenphp run --config .dev/Caddyfile',
            ]
        ports:
            - '80:80'
        volumes:
            - ../:/var/www/html
        tty: true
        environment:
            DB_HOST: db
            AUTORUN_ENABLED: true
            AUTORUN_LARAVEL_ROUTE_CACHE: false
            AUTORUN_LARAVEL_VIEW_CACHE: false
            AUTORUN_LARAVEL_STORAGE_LINK: true
            AUTORUN_LARAVEL_EVENT_CACHE: false
            AUTORUN_LARAVEL_CONFIG_CACHE: false
            AUTORUN_LARAVEL_OPTIMIZE: false
            AUTORUN_LARAVEL_MIGRATION: false
        networks:
            - backend
        healthcheck:
            test:
                [
                    'CMD-SHELL',
                    'curl -fsS http://127.0.0.1/ >/dev/null || exit 1',
                ]
            interval: 10s
            timeout: 5s
            retries: 5
        depends_on:
            db:
                condition: service_healthy
    node:
        build:
            context: ..
            dockerfile: .dev/Dockerfile
            args:
                USER_ID: ${USER_ID:-1000}
                GROUP_ID: ${GROUP_ID:-1000}
        command: ['sh', '-lc', 'npm run dev -- --host 0.0.0.0 --port 5173']
        volumes:
            - ../:/var/www/html
        tty: true
        ports:
            - '5173:5173'
        healthcheck:
            test:
                [
                    'CMD-SHELL',
                    'curl -fsS http://127.0.0.1:5173/@vite/client >/dev/null || exit 1',
                ]
            interval: 10s
            timeout: 5s
            retries: 5
    db:
        image: postgres:18.3-alpine3.23
        shm_size: 128mb
        restart: 'no'
        ports:
            - 5432:5432
        environment:
            POSTGRES_DB: laravel
            POSTGRES_USER: laravel
            POSTGRES_PASSWORD: laravel
        volumes:
            - db_data:/var/lib/postgresql
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U laravel -d laravel']
            interval: 5s
            timeout: 5s
            retries: 5
        networks:
            - backend
    adminer:
        image: adminer:5.4.2-standalone
        restart: 'no'
        ports:
            - 8080:8080
        networks:
            - backend
volumes:
    db_data:
networks:
    backend:
        driver: bridge
