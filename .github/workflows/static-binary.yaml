name: Build static binary

on:
    workflow_dispatch:
    push:
        tags:
            - 'v*'

env:
    BINARY_NAME: pogo-showcase-linux-x86_64
    IMAGE_NAME: pogo-showcase-static:ci
    FRANKENPHP_VERSION: 1.12.3

jobs:
    build:
        runs-on: ubuntu-latest
        timeout-minutes: 120
        permissions:
            contents: write

        steps:
            - name: Checkout Pogo Showcase
              uses: actions/checkout@v6

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build image with embedded app
              uses: docker/build-push-action@v7
              with:
                  context: .
                  file: static-build.Dockerfile
                  load: true
                  tags: ${{ env.IMAGE_NAME }}
                  build-args: |
                      FRANKENPHP_VERSION=${{ env.FRANKENPHP_VERSION }}

            - name: Extract binary
              run: |
                  mkdir -p dist
                  container="$(docker create "${IMAGE_NAME}")"
                  trap 'docker rm -f "${container}" >/dev/null' EXIT
                  docker cp "${container}:/go/src/app/dist/${BINARY_NAME}" "dist/${BINARY_NAME}"
                  chmod +x "dist/${BINARY_NAME}"

            - name: Verify binary
              run: |
                  file "dist/${BINARY_NAME}"
                  "dist/${BINARY_NAME}" version
                  sha256sum "dist/${BINARY_NAME}" > "dist/${BINARY_NAME}.sha256"

            - name: Upload workflow artifact
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ env.BINARY_NAME }}
                  path: |
                      dist/${{ env.BINARY_NAME }}
                      dist/${{ env.BINARY_NAME }}.sha256
                  compression-level: 0
                  retention-days: 30
                  if-no-files-found: error

            - name: Upload release assets
              if: startsWith(github.ref, 'refs/tags/v')
              uses: softprops/action-gh-release@v2
              with:
                  files: |
                      dist/${{ env.BINARY_NAME }}
                      dist/${{ env.BINARY_NAME }}.sha256
