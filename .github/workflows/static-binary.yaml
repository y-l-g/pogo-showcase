name: Build static binary

on:
    workflow_dispatch:
    push:
        tags:
            - 'v*'

env:
    BINARY_NAME: pogo-showcase-linux-x86_64
    IMAGE_NAME: pogo-showcase-static:ci
    FRANKENPHP_VERSION: 1.12.3

jobs:
    build:
        runs-on: ubuntu-latest
        timeout-minutes: 120
        permissions:
            contents: write

        steps:
            - name: Checkout Pogo Showcase
              uses: actions/checkout@v6

            - name: Preflight static binary inputs
              run: bash scripts/check-static-binary-inputs.sh

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build image with embedded app
              uses: docker/build-push-action@v7
              with:
                  context: .
                  file: static-build.Dockerfile
                  load: true
                  tags: ${{ env.IMAGE_NAME }}
                  build-args: |
                      FRANKENPHP_VERSION=${{ env.FRANKENPHP_VERSION }}
                  secrets: |
                      github-token=${{ secrets.GITHUB_TOKEN }}

            - name: Extract binary
              run: |
                  mkdir -p dist
                  container="$(docker create "${IMAGE_NAME}")"
                  trap 'docker rm -f "${container}" >/dev/null' EXIT
                  docker cp "${container}:/go/src/app/dist/${BINARY_NAME}" "dist/${BINARY_NAME}"
                  chmod +x "dist/${BINARY_NAME}"

            - name: Verify binary
              run: |
                  file "dist/${BINARY_NAME}"
                  "dist/${BINARY_NAME}" version
                  sha256sum "dist/${BINARY_NAME}" > "dist/${BINARY_NAME}.sha256"

            - name: Smoke test binary from empty directory
              run: |
                  workdir="$(mktemp -d)"
                  data_dir="$(mktemp -d)"
                  log_file="${RUNNER_TEMP}/pogo-showcase-smoke.log"

                  (
                      cd "${workdir}"
                      SERVER_NAME=:8080 \
                      POGO_SHOWCASE_DATA="${data_dir}" \
                      "${GITHUB_WORKSPACE}/dist/${BINARY_NAME}" php-server
                  ) >"${log_file}" 2>&1 &
                  pid="$!"

                  cleanup() {
                      if kill -0 "${pid}" >/dev/null 2>&1; then
                          kill "${pid}" >/dev/null 2>&1 || true
                          wait "${pid}" || true
                      fi
                  }
                  trap cleanup EXIT

                  fail_on_log_errors() {
                      if grep -E "Fatal error|Class (&quot;|\")Illuminate|worker script has failed|worker file not found|Undefined constant|No such file or directory" "${log_file}"; then
                          echo "Smoke test found startup errors"
                          cat "${log_file}"
                          exit 1
                      fi
                  }

                  for attempt in $(seq 1 60); do
                      if ! kill -0 "${pid}" >/dev/null 2>&1; then
                          echo "Binary exited before becoming healthy"
                          cat "${log_file}"
                          exit 1
                      fi

                      fail_on_log_errors

                      if curl -fsS http://127.0.0.1:8080/ >/dev/null; then
                          break
                      fi

                      if [ "${attempt}" -eq 60 ]; then
                          echo "Binary did not become healthy"
                          cat "${log_file}"
                          exit 1
                      fi

                      sleep 1
                  done

                  fail_on_log_errors

                  echo "Smoke test passed"

            - name: Upload workflow artifact
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ env.BINARY_NAME }}
                  path: |
                      dist/${{ env.BINARY_NAME }}
                      dist/${{ env.BINARY_NAME }}.sha256
                  compression-level: 0
                  retention-days: 30
                  if-no-files-found: error

            - name: Upload release assets
              if: startsWith(github.ref, 'refs/tags/v')
              uses: softprops/action-gh-release@v2
              with:
                  files: |
                      dist/${{ env.BINARY_NAME }}
                      dist/${{ env.BINARY_NAME }}.sha256
