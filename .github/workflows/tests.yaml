name: tests

on:
    push:
        branches: [main]
    workflow_dispatch:
jobs:
    ci:
        runs-on: ubuntu-latest
        if: ${{ github.event_name != 'push' || github.event.head_commit == null || !contains(github.event.head_commit.message, 'Merge pull request') || !contains(github.event.head_commit.message, 'renovate/') }}

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: 8.5
                  tools: composer:v2
                  coverage: xdebug

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: '25'
                  cache: 'npm'

            - name: Install Node Dependencies
              run: npm ci --legacy-peer-deps

            - name: Install Dependencies
              run: composer install --no-interaction --prefer-dist --optimize-autoloader

            - name: Copy Environment File
              run: cp .env.example .env

            - name: Generate Application Key
              run: php artisan key:generate

            - name: Build Assets
              run: npm run build

            - name: Frontend Lint
              run: npm run lint

            - name: Frontend Format Check
              run: npm run format:check

            - name: Tests
              env:
              run: ./vendor/bin/pest --configuration=phpunit.coverage.xml --coverage

            - name: Larastan
              run: ./vendor/bin/phpstan analyse --memory-limit=2G

            - name: Pint
              run: ./vendor/bin/pint --test
